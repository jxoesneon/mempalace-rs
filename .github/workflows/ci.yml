name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: actions/cache@v5 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Download fastembed model
        run: cargo run --bin download-model --release

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
        env:
          MEMPALACE_TEST_MODE: 1

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov # v2.12.0

      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
        env:
          MEMPALACE_TEST_MODE: 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4 # v5.1.2
        with:
          files: lcov.info
          fail_ci_if_error: false

  release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v5 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Download fastembed model
        run: cargo run --bin download-model --release

      - name: Build release binary
        run: cargo build --release --bin mempalace-rs

      - name: Package with models
        run: |
          mkdir -p mempalace-rs-${{ matrix.os }}
          cp target/release/mempalace-rs mempalace-rs-${{ matrix.os }}/
          cp -r models mempalace-rs-${{ matrix.os }}/
          tar -czf mempalace-rs-${{ matrix.os }}.tar.gz mempalace-rs-${{ matrix.os }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4 # v4.6.0
        with:
          name: mempalace-rs-${{ matrix.os }}
          path: mempalace-rs-${{ matrix.os }}.tar.gz

  benchmarks:
    name: Update Benchmarks
    needs: [test]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'pull_request') && (contains(github.ref, 'main') || contains(github.ref, 'master') || contains(github.ref, 'feature/aaak-evolution') || contains(github.head_ref, 'feature/aaak-evolution'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v5 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Download fastembed model
        run: cargo run --bin download-model --release

      - name: Run benchmarks
        run: cargo bench

      - name: Update documentation
        run: cargo run --bin update-benchmarks

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md benchmarks/README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: autonomously update benchmarks [skip ci]" && git push)

  publish:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    environment: release # Best practice for Trusted Publishing
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check if version exists
        id: check_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f 2)
          if cargo search mempalace-rs --limit 1 | grep -q "\"$VERSION\""; then
            echo "Version $VERSION already exists on crates.io, skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.check_version.outputs.skip != 'true'
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Authenticate with crates.io
        if: steps.check_version.outputs.skip != 'true'
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish
        if: steps.check_version.outputs.skip != 'true'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
