name: CI

permissions:
  contents: write

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. Unified Compilation Job
  compile:
    name: Compile & Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ca-certificates

      - name: Build Release
        run: cargo build --release --verbose

      - name: Download fastembed model
        run: ./target/release/download-model

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: compiled-mempalace
          path: |
            target/release/mempalace-rs
            target/release/update-benchmarks
            target/release/download-model
            models/
          retention-days: 1

  # Platform-specific build checks - catch OS-specific compilation issues early
  compile-windows:
    name: Compile Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Release (Windows)
        run: cargo build --release --verbose

  compile-macos:
    name: Compile macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Release (macOS)
        run: cargo build --release --verbose

  compile-linux:
    name: Compile Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ca-certificates

      - name: Build Release (Linux)
        run: cargo build --release --verbose

  # 2. Parallel Tasks using Artifacts
  test:
    name: Test & Lint
    needs: [compile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ca-certificates

      - name: Install Rust (for cargo test logic)
        uses: dtolnay/rust-toolchain@stable

      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          name: compiled-mempalace
          merge-multiple: true

      # We still need to give execution permissions after download
      - run: chmod +x target/release/mempalace-rs

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run tests
        run: cargo test --verbose
        env:
          MEMPALACE_TEST_MODE: 1

  coverage:
    name: Code Coverage
    needs: [compile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ca-certificates

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          name: compiled-mempalace
          merge-multiple: true

      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
        env:
          MEMPALACE_TEST_MODE: 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmarks:
    name: Update Benchmarks
    needs: [compile]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'pull_request') && (contains(github.ref, 'main') || contains(github.ref, 'master'))
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ca-certificates

      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          name: compiled-mempalace
          merge-multiple: true

      - run: |
          chmod +x target/release/mempalace-rs target/release/update-benchmarks

      - name: Run Gold Standard benchmarks
        run: |
          ./target/release/mempalace-rs benchmark ruler --k 10
          ./target/release/mempalace-rs benchmark structmem --hints
          ./target/release/mempalace-rs benchmark babilong --tokens 1000000
          ./target/release/mempalace-rs benchmark beam

      - name: Run Criterion micro-benchmarks
        run: cargo bench

      - name: Update documentation
        run: ./target/release/update-benchmarks

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md benchmarks/README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: autonomously update 2026 benchmarks [skip ci]" && git pull --rebase --autostash origin master && git push)

  release:
    name: Package Release
    needs: [compile]
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Download Artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/download-artifact@v5
        with:
          name: compiled-mempalace
          merge-multiple: true

      - name: Install Rust (MacOS Native)
        if: matrix.os == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      # Note: MacOS still needs to compile natively because cross-compiling artifacts is complex
      - name: Build MacOS (Native)
        if: matrix.os == 'macos-latest'
        run: |
          cargo build --release
          ./target/release/download-model

      - name: Package
        run: |
          mkdir -p mempalace-rs-${{ matrix.os }}
          cp target/release/mempalace-rs mempalace-rs-${{ matrix.os }}/
          cp -r models mempalace-rs-${{ matrix.os }}/ 2>/dev/null || true
          tar -czf mempalace-rs-${{ matrix.os }}.tar.gz mempalace-rs-${{ matrix.os }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: distribution-${{ matrix.os }}
          path: mempalace-rs-${{ matrix.os }}.tar.gz

  publish:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    needs: [test]
    environment: release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
